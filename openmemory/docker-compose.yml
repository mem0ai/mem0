services:
  mem0_store:
    image: qdrant/qdrant
    ports:
      - "6333:6333"
    volumes:
      - mem0_storage:/mem0/storage
  openmemory-mcp:
    image: mem0/openmemory-mcp
    build: api/
    environment:
      - USER
      - MEM0_DEFAULT_USER_ID=${USER}
      - SYNAPTIC_ENABLED=${SYNAPTIC_ENABLED:-}
      - SYNAPTIC_DB_DIR=/usr/src/openmemory/synaptic_data
      - PYTHONPATH=/usr/src/synaptic
    env_file:
      - api/.env
    depends_on:
      - mem0_store
    ports:
      - "8765:8765"
    volumes:
      - ./api:/usr/src/openmemory
      - ../synaptic_memory:/usr/src/synaptic/synaptic_memory
    command: >
      sh -c "uvicorn main:app --host 0.0.0.0 --port 8765 --reload --workers 1 --proxy-headers --forwarded-allow-ips=\"*\""
  openmemory-ui:
    init: true
    build:
      context: ui/
      dockerfile: Dockerfile
    image: mem0/openmemory-ui:latest
    ports:
      - "3012:3000"
    environment:
      - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL}
      - NEXT_PUBLIC_USER_ID=${USER}

volumes:
  mem0_storage:
