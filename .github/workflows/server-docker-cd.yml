name: Publish server Docker image 🐳 to Docker Hub

# Dispatched by release.yml (Release Router) when a release tagged server-v* is
# published. Can also be dispatched manually to re-publish a tag.
on:
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag to build and publish (e.g. server-v0.1.114)'
        required: true
        type: string
      prerelease:
        description: 'Whether this is a pre-release'
        required: false
        type: boolean
        default: false

jobs:
  build-and-push:
    # Skip on forks unless someone has copied secrets in — avoids confusing failures
    # for downstream users who fork the repo.
    if: github.repository == 'mem0ai/mem0' && (startsWith(inputs.tag, 'server-v') || startsWith(inputs.tag, 'v'))
    name: Build + push mem0-api-server
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.tag }}

      - name: Parse tag
        id: parse_tag
        run: |
          TAG="${{ inputs.tag }}"
          # Strip 'server-' prefix if present
          CLEAN_TAG="${TAG#server-}"
          echo "clean_tag=$CLEAN_TAG" >> "$GITHUB_OUTPUT"

      - name: Set up QEMU (for arm64 cross-build)
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract metadata (tags, labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: mem0/mem0-api-server
          # On release/v*: produce vX.Y.Z, vX.Y, vX, latest tags.
          # On manual dispatch: use the input tag verbatim.
          tags: |
            type=semver,pattern={{version}},value=${{ steps.parse_tag.outputs.clean_tag }}
            type=semver,pattern={{major}}.{{minor}},value=${{ steps.parse_tag.outputs.clean_tag }}
            type=semver,pattern={{major}},value=${{ steps.parse_tag.outputs.clean_tag }}
            type=raw,value=latest,enable=${{ inputs.prerelease == false }}
            type=raw,value=${{ steps.parse_tag.outputs.clean_tag }}

      - name: Build + push
        uses: docker/build-push-action@v6
        with:
          context: ./server
          file: ./server/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          platforms: linux/amd64,linux/arm64
          # GitHub-hosted layer cache — speeds up subsequent builds, no extra setup.
          cache-from: type=gha
          cache-to: type=gha,mode=max

