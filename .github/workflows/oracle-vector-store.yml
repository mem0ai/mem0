name: oracle-vector-store

on:
  workflow_dispatch:
  push:
    paths:
      - "mem0/vector_stores/oracle.py"
      - "mem0/configs/vector_stores/oracle.py"
      - "tests/vector_stores/test_oracle.py"
      - "docs/components/vectordbs/dbs/oracle.mdx"
      - "docs/components/vectordbs/overview.mdx"
      - "mem0/vector_stores/configs.py"
      - "mem0/utils/factory.py"
      - "pyproject.toml"
      - ".github/workflows/oracle-vector-store.yml"
  pull_request:
    paths:
      - "mem0/vector_stores/oracle.py"
      - "mem0/configs/vector_stores/oracle.py"
      - "tests/vector_stores/test_oracle.py"
      - "docs/components/vectordbs/dbs/oracle.mdx"
      - "docs/components/vectordbs/overview.mdx"
      - "mem0/vector_stores/configs.py"
      - "mem0/utils/factory.py"
      - "pyproject.toml"
      - ".github/workflows/oracle-vector-store.yml"

jobs:
  test-oracle-vector-store:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Prepare writable local directories
        run: |
          mkdir -p "$GITHUB_WORKSPACE/.home" "$GITHUB_WORKSPACE/.cache"

      - name: Install test dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[test,vector_stores]"

      - name: Run Oracle vector store tests
        env:
          HOME: ${{ github.workspace }}/.home
          XDG_CACHE_HOME: ${{ github.workspace }}/.cache
        run: pytest tests/vector_stores/test_oracle.py -q
