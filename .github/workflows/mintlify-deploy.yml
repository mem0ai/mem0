name: Mintlify Deploy

# Pings the Mintlify deploy hook on every push to main, unconditionally.
#
# Why: the Mintlify GitHub App detects docs changes by path-matching the
# diff, and historically misses some legitimate docs commits — docs.mem0.ai
# drifts out of sync and we have to push a no-op commit to force a redeploy
# (see e.g. 843ab829 "chore: trigger Mintlify redeploy for #5152 docs").
# Calling the hook on every push to main bypasses path detection entirely.
#
# Prerequisite: set repo secret MINTLIFY_DEPLOY_HOOK_URL to the value
# generated in the Mintlify dashboard under Settings → Deploy Hooks.
# If the secret is absent the workflow is a clean no-op (prints a warning
# and exits 0) so this commit is safe to merge before the secret exists.

on:
  push:
    branches: [main]
  workflow_dispatch: {}

permissions:
  contents: read

jobs:
  trigger:
    runs-on: ubuntu-24.04-arm
    timeout-minutes: 2
    steps:
      - name: POST to Mintlify deploy hook
        env:
          HOOK: ${{ secrets.MINTLIFY_DEPLOY_HOOK_URL }}
        run: |
          if [ -z "$HOOK" ]; then
            echo "::warning::MINTLIFY_DEPLOY_HOOK_URL is not configured; skipping deploy hook ping."
            exit 0
          fi
          curl -sS --fail -X POST "$HOOK" -o /tmp/mintlify.out -w "HTTP %{http_code}\n"
          echo "Deploy hook response:"
          cat /tmp/mintlify.out
